env: development

server:
  host: localhost
  port: "4003"

database:
  url: postgres://iam:password123@localhost:5433/iam?sslmode=disable
  prefer_simple_protocol: false

jwt:
  secret: your-secret-key-change-in-production
  access_token_ttl: 3600
  refresh_token_ttl: 3600
  issuer: iam-authorization-service
  audience: platform-console

tenancy:
  default_tenant_id: default

# Object storage for avatar uploads (S3-compatible). Local dev points at MinIO
# with the same wahb-media bucket the rest of the stack uses. Override per
# environment via STORAGE_* env vars; an empty endpoint disables avatar upload.
storage:
  endpoint: "http://localhost:9000"
  bucket: "wahb-media"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  public_url: "http://localhost:9000"
  region: "us-east-1"

email:
  smtp_host: ""
  smtp_port: "587"
  smtp_password: ""
  from_address: "noreply@wahb.dev"
  verification_base_url: "http://localhost:3005"
  reset_base_url: "http://localhost:3005"
  require_verification: false









