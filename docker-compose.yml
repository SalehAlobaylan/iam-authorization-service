services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: iam
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam -d iam"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database-migrations/migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://iam:password123@postgres:5432/iam?sslmode=disable",
        "-verbose",
        "up"
      ]

  api:
    build: .
    depends_on:
      migrations:
        condition: service_completed_successfully
    ports:
      - "4003:4003"
    volumes:
      - ./src/config/config.yaml:/app/src/config/config.yaml:ro
    environment:
      HOST: 0.0.0.0
      PORT: 4003
      DATABASE_URL: postgres://iam:password123@postgres:5432/iam?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set and must match the value used by CMS}
      SEED_ON_STARTUP: "true"

volumes:
  postgres_data:
